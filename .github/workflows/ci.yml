name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            libclang-dev \
            pkg-config \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libavfilter-dev \
            libavdevice-dev \
            libswresample-dev
      - name: Format
        run: cargo fmt --check
      - name: Workspace check
        run: cargo check --workspace --all-targets
      - name: rustscan-types tests
        run: cargo test -p rustscan-types --lib
      - name: RustFF tests
        run: cargo test -p rustff --lib
      - name: RustGS tests
        run: cargo test -p rustgs --all-targets
      - name: RustViewer tests
        run: cargo test -p rust-viewer --all-targets
      - name: RustScan CLI tests
        run: cargo test -p rustscan --all-targets
      - name: RustMesh tests
        working-directory: RustMesh
        run: cargo test
      - name: RustSLAM tests (including E2E)
        working-directory: RustSLAM
        env:
          RUSTSCAN_E2E: "1"
        run: cargo test
